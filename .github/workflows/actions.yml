name: Build and test Lotto
on: [push]
env:
  RUST_VERSION: 1.82
jobs:
  build-and-test:
    name: ${{ matrix.toolchain }} rust=${{ matrix.rust }} type=${{ matrix.variant }}
    runs-on: ubuntu-latest
    container: ghcr.io/open-s4c/lotto/core-ci:latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [gnu, clang]
        rust: [ON, OFF]
        variant: [Debug, Release, LTO]
        exclude:
          - toolchain: clang
            variant: LTO
        include:
          - toolchain: gnu
            cc: gcc
            cxx: g++
          - toolchain: clang
            cc: clang
            cxx: clang++
          - variant: Debug
            cmake_build_type: Debug
            lotto_lto: OFF
          - variant: Release
            cmake_build_type: Release
            lotto_lto: OFF
          - variant: LTO
            cmake_build_type: Release
            lotto_lto: ON
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Prepare Rust toolchain
        if: ${{ matrix.rust == 'ON' }}
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_VERSION }}
      - name: Configure project
        run: >
          cmake -Bbuild
          -DCMAKE_BUILD_TYPE=${{ matrix.cmake_build_type }}
          -DCMAKE_C_COMPILER=${{ matrix.cc }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx }}
          -DLOTTO_RUST=${{ matrix.rust }}
          -DLOTTO_LTO=${{ matrix.lotto_lto }}
      - name: Expand templates in Dice
        run: cmake --build build --target expand-tsan.c
      - name: Build Dice library
        run: cmake --build build --target dice -j
      - name: Build Lotto
        run: cmake --build build -j
      - name: Run unit tests
        run: cmake --build build --target test
      - name: Run tikl tests
        run: cmake --build build --target tikl-test
