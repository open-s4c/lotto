#
# Minimal evbarm-aarch64 kernel for QEMU virt guest bug images.
# This is a proxy kernel for aarch64-only testing, not a faithful PR 58561
# Xen/amd64 reproduction kernel.
#

include "arch/evbarm/conf/std.generic64"
include "arch/arm/pic/files.pic"
include "arch/arm/cortex/files.cortex"
include "arch/evbarm/conf/files.fdt"
include "arch/evbarm/conf/GENERIC.common"

ident		QLOTTO58561MIN

maxusers	16

# Keep the guest focused on the QEMU virt machine.
options 	CPU_CORTEX
options 	MULTIPROCESSOR
options 	LOCKDEBUG
options 	EARLYCONS=plcom, CONSADDR=0x09000000

# Drop compatibility and large optional subsystems we don't need.
no options	COMPAT_NETBSD32
no options	NTP
no options	BUSDMA_COUNTERS
no options	QUOTA
no options	QUOTA2
no options	UFS_ACL
no options	UFS_DIRHASH
no options	UFS_EXTATTR
no options	WAPBL
no options	NFSSERVER
no options	INET6
no options	IPSEC
no options	PPP_BSDCOMP
no options	PPP_DEFLATE
no options	PPP_FILTER
no options	BPFJIT
no options	NFS_BOOT_DHCP
no options	SYSVMSG
no options	SYSVSEM
no options	SYSVSHM
no options	KTRACE
no options	USERCONF
no options	SYSCTL_INCLUDE_DESCR
no options	KDTRACE_HOOKS
no options	DDB
no options	DDB_ONPANIC
no options	ACPI_REDUCED_HW
no options	MODULAR
no options	MODULAR_DEFAULT_AUTOLOAD
no options	PCI_NETBSD_CONFIGURE
no options	PCI_RESOURCE
no options	PCI_SMCCC

# Trim file systems to what the bug images use.
no file-system	CODA
no file-system	EXT2FS
no file-system	FDESC
no file-system	KERNFS
no file-system	LFS
no file-system	MSDOSFS
no file-system	NTFS
no file-system	NULLFS
no file-system	OVERLAY
no file-system	PROCFS
no file-system	PUFFS
no file-system	PTYFS
no file-system	UMAPFS
no file-system	UNION

# Trim pseudo-devices and features not needed by the current bug images.
no pseudo-device	crypto
no pseudo-device	swcrypto
no pseudo-device	vnd
no pseudo-device	fss
no pseudo-device	drvctl
no pseudo-device	cgd
no pseudo-device	raid
no pseudo-device	bpfilter
no pseudo-device	carp
no pseudo-device	bridge
no pseudo-device	vether
no pseudo-device	vlan
no pseudo-device	ppp
no pseudo-device	pppoe
no pseudo-device	tun
no pseudo-device	tap
no pseudo-device	gif
no pseudo-device	ipsecif
no pseudo-device	gre
no pseudo-device	npf
no pseudo-device	pad
no pseudo-device	clockctl
no pseudo-device	ksyms
no pseudo-device	swwdog
no pseudo-device	openfirm
no pseudo-device	efi
no pseudo-device	tprof
no pseudo-device	lockstat

# Core machine support.
armfdt0		at root
simplebus*	at fdt? pass 0
cpus*		at fdt? pass 0
cpu*		at fdt? pass 0
psci*		at fdt? pass 0
fclock* 	at fdt? pass 1
gtmr*		at fdt? pass 2
armgtmr0	at gtmr?
gic*		at fdt? pass 1
armgic0 	at gic?
gicvthree*	at fdt? pass 1

# QEMU firmware config is handy for exported files/vars.
qemufwcfg*	at fdt?

# Serial console on QEMU virt.
plcom*		at fdt? pass 4

# Minimal virtio-mmio stack.
virtio*		at fdt?
include "dev/virtio/virtio.config"
no viomb*	at virtio?
no viogpu*	at virtio?
no vioscsi*	at virtio?

config		netbsd	root on ? type ?
